name: Run Supabase ETL

# Trigger manually from the Actions tab, or automatically every night at 23:00 UTC.
# To run on demand: Actions → "Run Supabase ETL" → Run workflow.
on:
  workflow_dispatch:
  schedule:
    - cron: '0 23 * * *'

jobs:
  etl:
    name: Promote order_entry → normalized schema
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ETL
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python supabase/etl_supabase.py
